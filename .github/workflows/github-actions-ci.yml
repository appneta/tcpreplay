name: GitHub Actions Tests
run-name: ${{ github.actor }} is running tests using GitHub Actions
on: [push]
jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v3
      - run: echo "The ${{ github.repository }} repository has been cloned to the runner."
      - name: Install prereqs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt -y install autogen libpcap-dev automake autoconf libtool libxdp-dev liburing-dev
      - name: Install prereqs (macOS)
        if: runner.os == 'macOS'
        run: brew install autogen libpcap automake autoconf libtool
      - name: Create a build directory
        run: mkdir -p build
      - name: Create configure script
        run: pushd build; ../autogen.sh; popd
      - name: configure
        run: pushd build; ../configure --disable-local-libopts --enable-debug --enable-test-hexdump; popd
      - name: make
        run: pushd build; make; popd
      - name: make dist
        run: pushd build; make dist; popd
      - name: make dist-xz
        run: pushd build; make dist-xz; popd
      - name: List files in the repository
        run: ls ${{ github.workspace }}
      - name: List interfaces via tcpreplay
        run: pushd build; sudo src/tcpreplay --listnics; popd
      - name: tests
        run: pushd build; sudo make test || (cat test/test.log >&2; false); popd
      - name: io_uring variant tests
        if: runner.os == 'Linux'
        run: pushd build; sudo make -C test tcpreplay_io_uring || (cat test/test.log >&2; false); popd
      - run: echo "This test's status is ${{ job.status }}."
  cmake-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Install prereqs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt -y install autogen libpcap-dev libxdp-dev liburing-dev cmake
      - name: Install prereqs (macOS)
        if: runner.os == 'macOS'
        run: brew install autogen libpcap cmake
      - name: configure
        run: cmake -B build-cmake -DENABLE_DEBUG=ON
      - name: build
        run: cmake --build build-cmake -j 4
      - name: smoke test
        run: |
          build-cmake/src/tcpreplay --version
          build-cmake/src/tcprewrite --version
          build-cmake/src/tcpprep --version
          build-cmake/src/tcpcapinfo --version
          sudo build-cmake/src/tcpreplay --listnics
      - name: verify rewrite output matches golden fixture
        run: |
          build-cmake/src/tcprewrite -i test/test.pcap -o portmap.pcap -r 80:8080
          cmp portmap.pcap test/test2.rewrite_portmap
