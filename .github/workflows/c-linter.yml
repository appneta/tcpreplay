name: cpp-linter

on: pull_request

jobs:
  cpp-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          echo "Build Application"
          sudo apt-get -y install libpcap-dev cmake liburing-dev libxdp-dev libbpf-dev
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build -j 4
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          version: 14
          lines-changed-only: true
          files-changed-only: false
          # generated AutoOpts output (committed since #895) is not ours to lint
          ignore: .github|docs|scripts|src/tcpreplay_opts.c|src/tcpreplay_opts.h|src/tcpreplay_edit_opts.c|src/tcpreplay_edit_opts.h|src/tcprewrite_opts.c|src/tcprewrite_opts.h|src/tcpprep_opts.c|src/tcpprep_opts.h|src/tcpbridge_opts.c|src/tcpbridge_opts.h|src/tcpliveplay_opts.c|src/tcpliveplay_opts.h|src/tcpcapinfo_opts.c|src/tcpcapinfo_opts.h|src/tcpedit/tcpedit_stub.h
          database: build

      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed > 0
        # for testing...
        # run: echo "Some files failed the linting checks!"
        # for development...
        run: exit 0 # exit the job with a success status
        # for actual deployment...
        # run: exit 1 # exit the job with a failure status

